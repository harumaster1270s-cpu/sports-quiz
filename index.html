<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スポーツ脳トレクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060910;--surface:#0d1520;--surface2:#131e2e;--border:rgba(255,255,255,0.07);
  --accent:#00c9ff;--accent2:#f5a623;--green:#00e676;--red:#ff5252;
  --text:#e8f0fe;--muted:#5a7090;
  --font-display:'Bebas Neue',cursive;--font-body:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(0,140,255,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(245,166,35,.06) 0%,transparent 60%);pointer-events:none;}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,201,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,201,255,.03) 1px,transparent 1px);background-size:40px 40px;}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.screen{width:100%;max-width:540px;padding:24px 16px;display:none;flex-direction:column;align-items:center;animation:fadeUp .35s ease both;}
.screen.active{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}

/* HOME */
.home-hero{text-align:center;padding:28px 0 20px;}
.trophy{font-size:64px;display:block;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.app-title{font-family:var(--font-display);font-size:48px;letter-spacing:4px;color:#fff;line-height:1;margin:10px 0 4px;}
.app-title span{color:var(--accent);}
.app-sub{font-size:12px;color:var(--muted);letter-spacing:.05em;}
.stats-row{display:flex;gap:10px;width:100%;margin:16px 0;}
.stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.stat-val{font-family:var(--font-display);font-size:28px;color:var(--accent);}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px;}
.stage-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.stage-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px 12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.stage-card:not(.locked):hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,201,255,.15);}
.stage-card.locked{opacity:.4;cursor:not-allowed;}
.stage-card.cleared{border-color:rgba(0,230,118,.4);}
.stage-emoji{font-size:26px;display:block;margin-bottom:7px;}
.stage-name{font-size:12px;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.3;}
.diff-dots{display:flex;gap:3px;margin-bottom:5px;}
.diff-dot{width:7px;height:7px;border-radius:50%;background:var(--border);}
.diff-dot.on{background:var(--accent2);}
.diff-dot.red{background:#f87171;}
.stage-stars{display:flex;gap:2px;}
.s-star{font-size:13px;color:#2a3a4a;}
.s-star.lit{color:#f5a623;}
.lock-icon{position:absolute;top:10px;right:10px;font-size:14px;color:var(--muted);}
.cleared-badge{position:absolute;top:7px;right:7px;background:rgba(0,230,118,.15);border:1px solid rgba(0,230,118,.3);color:var(--green);font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;}

/* QUIZ */
.quiz-top{width:100%;margin-bottom:18px;}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.quiz-stage-name{font-size:12px;color:var(--muted);}
.quiz-score{font-family:var(--font-display);font-size:22px;color:var(--accent2);}
.progress-bar{width:100%;height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#0080ff);transition:width .4s ease;}
.q-counter{font-size:11px;color:var(--muted);text-align:right;margin-top:4px;}
.question-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 18px;margin-bottom:18px;min-height:90px;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;}
.question-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.q-text{font-size:16px;font-weight:700;line-height:1.6;color:#fff;}
.choices{display:flex;flex-direction:column;gap:9px;width:100%;}
.choice-btn{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;text-align:left;font-family:var(--font-body);display:flex;align-items:center;gap:10px;}
.choice-btn:not(:disabled):hover{border-color:var(--accent);background:rgba(0,201,255,.06);}
.choice-label{width:22px;height:22px;border-radius:5px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:var(--muted);}
.choice-btn.correct{border-color:var(--green);background:rgba(0,230,118,.08);color:var(--green);}
.choice-btn.correct .choice-label{background:rgba(0,230,118,.2);color:var(--green);}
.choice-btn.wrong{border-color:var(--red);background:rgba(255,82,82,.08);color:var(--red);}
.choice-btn.wrong .choice-label{background:rgba(255,82,82,.2);color:var(--red);}
.choice-btn.dim{opacity:.32;}
.choice-btn:disabled{cursor:default;}
.explanation{width:100%;border-radius:12px;padding:13px 15px;margin-top:10px;font-size:12px;line-height:1.7;animation:fadeUp .3s ease;}
.explanation.ok{background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.2);color:#a0f0c0;}
.explanation.ng{background:rgba(255,82,82,.07);border:1px solid rgba(255,82,82,.2);color:#ffaaaa;}
.expl-head{font-weight:700;font-size:14px;margin-bottom:5px;}
.next-btn{width:100%;margin-top:12px;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#0080ff);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:opacity .2s;}
.next-btn:hover{opacity:.88;}

/* CLEAR */
.clear-screen{text-align:center;padding:16px 0;}
.clear-big{font-size:72px;animation:popIn .5s cubic-bezier(.17,.67,.27,1.4) both;}
@keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}
.clear-title{font-family:var(--font-display);font-size:44px;letter-spacing:3px;color:#fff;margin:10px 0 4px;}
.clear-stage{font-size:13px;color:var(--muted);margin-bottom:20px;}
.result-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:18px;}
.result-row{display:flex;justify-content:space-around;}
.result-item{text-align:center;}
.result-num{font-family:var(--font-display);font-size:34px;}
.result-num.good{color:var(--green);}
.result-num.accent{color:var(--accent);}
.result-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.stars-row{display:flex;justify-content:center;gap:8px;margin:14px 0 22px;}
.big-star{font-size:40px;filter:grayscale(1) brightness(.3);transition:all .3s;}
.big-star.lit{filter:none;animation:starPop .4s cubic-bezier(.17,.67,.27,1.4) both;}
@keyframes starPop{from{transform:scale(0) rotate(-30deg);}to{transform:scale(1) rotate(0);}}
.clear-btns{display:flex;flex-direction:column;gap:10px;width:100%;}
.btn-primary{padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#0080ff);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-body);}
.btn-secondary{padding:14px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:14px;cursor:pointer;font-family:var(--font-body);transition:all .2s;}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

/* CONFETTI */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
.confetti-piece{position:absolute;top:-10px;width:8px;height:12px;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-hero">
      <span class="trophy"> </span>
      <div class="app-title">SPORTS<span>QUIZ</span></div>
      <div class="app-sub">スポーツ脳トレクイズ ／ 全10ステージ・100問</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val" id="stat-cleared">0</div><div class="stat-label">クリアステージ</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-correct">0</div><div class="stat-label">累計正解数</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-stars">0</div><div class="stat-label">獲得★</div></div>
    </div>
    <div class="stage-grid" id="stage-grid"></div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-top">
      <div class="quiz-meta">
        <span class="quiz-stage-name" id="quiz-stage-name"></span>
        <span class="quiz-score" id="quiz-score">0点</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="q-counter" id="q-counter"></div>
    </div>
    <div class="question-box"><div class="q-text" id="q-text"></div></div>
    <div class="choices" id="choices"></div>
    <div id="explanation"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()"></button>
  </div>

  <!-- CLEAR -->
  <div class="screen" id="screen-clear">
    <div class="clear-screen">
      <div class="clear-big" id="clear-emoji"></div>
      <div class="clear-title" id="clear-title"></div>
      <div class="clear-stage" id="clear-stage-name"></div>
      <div class="result-card">
        <div class="result-row">
          <div class="result-item"><div class="result-num good" id="res-score"></div><div class="result-lbl">正解数</div></div>
          <div class="result-item"><div class="result-num accent" id="res-rate"></div><div class="result-lbl">正答率</div></div>
        </div>
      </div>
      <div class="stars-row">
        <div class="big-star" id="star0">?</div>
        <div class="big-star" id="star1">?</div>
        <div class="big-star" id="star2">?</div>
      </div>
      <div class="clear-btns">
        <button class="btn-primary" onclick="goHome()">ステージ一覧へ</button>
        <button class="btn-secondary" onclick="retryStage()">もう一度挑戦</button>
      </div>
    </div>
  </div>

</div>
<div class="confetti-wrap" id="confetti"></div>

<script>
const STAGES = [
  {
    id:'s1',title:'サッカー基礎',emoji:'?',diff:1,
    questions:[
      {q:'サッカーの1チームの選手数は何人？',c:['9人','10人','11人','12人'],a:2,e:'1チーム11人。フィールドプレーヤー10人＋ゴールキーパー1人で構成されます。'},
      {q:'FIFAワールドカップは何年に1度開催される？',c:['2年','3年','4年','5年'],a:2,e:'ワールドカップは4年に1度。1930年ウルグアイで第1回大会が開催されました。'},
      {q:'サッカーでPKとは何の略？',c:['パワーキック','ペナルティキック','プレイキック','ポイントキック'],a:1,e:'PK＝ペナルティキック。ゴール前約11mの地点から蹴ります。'},
      {q:'サッカーの試合時間（前後半合計）は？',c:['60分','80分','90分','100分'],a:2,e:'前後半各45分、合計90分。これにアディショナルタイムが加わります。'},
      {q:'日本のJリーグが開幕した年は？',c:['1991年','1993年','1995年','1997年'],a:1,e:'Jリーグは1993年5月15日に開幕しました。'},
      {q:'イエローカード2枚で何になる？',c:['退場','警告のみ','PK','交代'],a:0,e:'1試合でイエローカード2枚→レッドカードとなり退場になります。'},
      {q:'サッカーボールは何角形の組み合わせ？',c:['三角形と四角形','四角形と五角形','五角形と六角形','六角形と七角形'],a:2,e:'五角形（黒）と六角形（白）を組み合わせた32面体です。'},
      {q:'ハットトリックとは1試合で何ゴール？',c:['2ゴール','3ゴール','4ゴール','5ゴール'],a:1,e:'1試合で同一選手が3ゴールを決めることをハットトリックといいます。'},
      {q:'オフサイドは何人目のDFより前に出ると取られる？',c:['1人目','2人目','3人目','4人目'],a:1,e:'後方から2人目のDF（通常GKを含む）より前にいると適用されます。'},
      {q:'2022年FIFAワールドカップの開催国は？',c:['ロシア','ブラジル','カタール','UAE'],a:2,e:'2022年W杯はカタールで開催。中東初・冬季開催という歴史的大会でした。'},
    ]
  },
  {
    id:'s2',title:'野球基礎',emoji:'?',diff:1,
    questions:[
      {q:'野球でスリーアウトになると何が起こる？',c:['試合終了','攻守交代','ペナルティ','得点'],a:1,e:'スリーアウトで攻守交代。3アウトを1イニングとし、9イニングで1試合です。'},
      {q:'野球の塁（ベース）は全部で何個？',c:['3個','4個','5個','6個'],a:1,e:'1塁・2塁・3塁・本塁（ホームベース）の計4つのベースがあります。'},
      {q:'ホームランを打った場合、何点入る（ランナーなし）？',c:['1点','2点','3点','4点'],a:0,e:'ランナーなしのホームランは1点。満塁ホームランは4点（グランドスラム）です。'},
      {q:'日本プロ野球（NPB）の2つのリーグは？',c:['東・西リーグ','セ・パリーグ','日本・東京リーグ','太平洋・大西洋リーグ'],a:1,e:'セントラル・リーグ（セ）とパシフィック・リーグ（パ）の2リーグ制です。'},
      {q:'ノーヒットノーランとは？',c:['ヒットもランも打たれた','ヒットなしで完封','9イニング全三振','HRなしで勝利'],a:1,e:'1試合を通じて相手にヒットを1本も許さずに完封することです。'},
      {q:'フォアボール（四球）はボール何個で与えられる？',c:['3個','4個','5個','6個'],a:1,e:'4つのボール判定でバッターは1塁への出塁権を得ます。'},
      {q:'甲子園で開催される全国大会の正式名称は？',c:['全国高校野球選手権大会','全国高校野球大会','日本高校野球選手権','全日本高校野球大会'],a:0,e:'「全国高等学校野球選手権大会」。毎年夏に甲子園球場で開催されます。'},
      {q:'MLBのワールドシリーズはどのリーグ間の戦い？',c:['東地区と西地区','アメリカンとナショナルリーグ','北と南地区','メジャーとマイナー'],a:1,e:'アメリカンリーグとナショナルリーグの優勝チームが対戦するMLBの頂上決戦です。'},
      {q:'サイクルヒットとは1試合で何を達成すること？',c:['4打席連続ヒット','単打・二塁打・三塁打・本塁打を各1本','満塁HR2本','全打席出塁'],a:1,e:'1試合で単打・二塁打・三塁打・本塁打をそれぞれ最低1本ずつ打つことです。'},
      {q:'大谷翔平選手の2024年時点の所属チームは？',c:['NYヤンキース','LAドジャース','ボストンRS','LAエンゼルス'],a:1,e:'2024年からロサンゼルス・ドジャースに所属しています。'},
    ]
  },
  {
    id:'s3',title:'バスケットボール',emoji:' ',diff:2,
    questions:[
      {q:'バスケットボールのコート上の1チームの人数は？',c:['4人','5人','6人','7人'],a:1,e:'1チーム5人でプレー。ベンチには最大7人の控えがいます。'},
      {q:'NBAのゴールの高さは地面から何フィート？',c:['8フィート','9フィート','10フィート','11フィート'],a:2,e:'バスケのゴールの高さは10フィート（約3.05m）と定められています。'},
      {q:'スリーポイントラインの外から決めたシュートは何点？',c:['1点','2点','3点','4点'],a:2,e:'スリーポイントライン外から成功すると3点。フリースローは1点、通常は2点です。'},
      {q:'バスケットボールを考案したのは誰？',c:['マイケル・ジョーダン','ジェームズ・ネイスミス','コービー・ブライアント','ラリー・バード'],a:1,e:'1891年にカナダ人のジェームズ・ネイスミス博士がYMCAで考案しました。'},
      {q:'八村塁選手が最初に所属したNBAのチームは？',c:['GSウォリアーズ','ワシントン・ウィザーズ','LAレイカーズ','ダラス・マーベリックス'],a:1,e:'2019年NBAドラフトでワシントン・ウィザーズから1巡目9位で指名されました。'},
      {q:'ドリブルせずに何歩歩くとトラベリングになる？',c:['1歩','2歩','3歩','4歩'],a:1,e:'ボールを持って2歩以上歩くとトラベリングの反則になります。'},
      {q:'NBAのレギュラーシーズンは1チーム何試合？',c:['62試合','72試合','82試合','92試合'],a:2,e:'NBAのレギュラーシーズンは各チーム82試合で構成されています。'},
      {q:'マイケル・ジョーダンが所属していたチームは？',c:['ボストン・セルティックス','シカゴ・ブルズ','LAレイカーズ','マイアミ・ヒート'],a:1,e:'シカゴ・ブルズで活躍し、6度のNBA優勝を果たしました。'},
      {q:'ファウルが規定数を超えて退場になることを何という？',c:['レッドカード','ファウルアウト','エジェクション','ディスクォリファイ'],a:1,e:'NBAでは1試合6つのファウルでファウルアウトとなり退場です。'},
      {q:'バスケットボールの試合時間（NBA）は？',c:['8分×4Q','10分×4Q','12分×4Q','24分×2H'],a:2,e:'NBAは1クォーター12分×4で合計48分。FIBA国際試合は10分×4で40分です。'},
    ]
  },
  {
    id:'s4',title:'テニス・卓球',emoji:' ',diff:2,
    questions:[
      {q:'テニスでサービスを2回連続ミスすると？',c:['警告','ダブルフォルト（失点）','サービスやり直し','ポイント×2'],a:1,e:'ダブルフォルトとなり相手に1ポイント入ります。'},
      {q:'テニスの四大大会（グランドスラム）に含まれないのは？',c:['全豪オープン','ジャパンオープン','ウィンブルドン','全米オープン'],a:1,e:'グランドスラムは全豪・全仏・ウィンブルドン・全米の4大会です。'},
      {q:'テニスで40-40の状態を何という？',c:['タイブレーク','デュース','アドバンテージ','マッチポイント'],a:1,e:'40-40をデュースといいます。2ポイント連続で取ったほうがゲームを取ります。'},
      {q:'大坂なおみ選手が2019年に選択した国籍は？',c:['アメリカ','日本','カナダ','オーストラリア'],a:1,e:'大坂なおみ選手は2019年に日本国籍を選択しました。'},
      {q:'卓球のボールの直径は何mm？',c:['38mm','40mm','42mm','44mm'],a:1,e:'2000年以降の国際公式球は直径40mm、重さ2.7gです。'},

const LABELS=['A','B','C','D'];
let state={stageIndex:0,qIndex:0,score:0,answered:false};

function getProgress(){try{return JSON.parse(localStorage.getItem('sqProgress2')||'{}');}catch{return {};}}
function saveProgress(stageId,score,stars){
  const p=getProgress();
  if(!p[stageId]||score>(p[stageId].best||0))p[stageId]={best:score,stars};
  else if(stars>(p[stageId].stars||0))p[stageId].stars=stars;
  localStorage.setItem('sqProgress2',JSON.stringify(p));
}
function calcStars(score,total){
  const r=score/total;
  if(r>=1)return 3;if(r>=0.7)return 2;if(r>=0.5)return 1;return 0;
}
function isUnlocked(i){
  if(i===0)return true;
  const p=getProgress();
  return !!(p[STAGES[i-1].id]?.stars>0);
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function renderHome(){
  const p=getProgress();
  let cleared=0,correct=0,totalStars=0;
  STAGES.forEach(s=>{if(p[s.id]){if(p[s.id].stars>0)cleared++;correct+=p[s.id].best||0;totalStars+=p[s.id].stars||0;}});
  document.getElementById('stat-cleared').textContent=`${cleared}/${STAGES.length}`;
  document.getElementById('stat-correct').textContent=correct;
  document.getElementById('stat-stars').textContent=totalStars;
  const grid=document.getElementById('stage-grid');
  grid.innerHTML='';
  STAGES.forEach((s,i)=>{
    const unlocked=isUnlocked(i);
    const prog=p[s.id]||{};
    const stars=prog.stars||0;
    const card=document.createElement('div');
    card.className='stage-card'+(unlocked?'':' locked')+(stars>0?' cleared':'');
    const dots=[0,1,2,3].map(d=>`<div class="diff-dot${d<s.diff?(d<3?' on':' red'):''}"></div>`).join('');
    card.innerHTML=`
      <span class="stage-emoji">${s.emoji}</span>
      <div class="stage-name">${s.title}</div>
      <div class="diff-dots">${dots}</div>
      <div class="stage-stars">${[0,1,2].map(d=>`<span class="s-star${d<stars?' lit':''}">★</span>`).join('')}</div>
      ${!unlocked?'<div class="lock-icon"> </div>':''}
      ${stars>0?'<div class="cleared-badge">CLEAR</div>':''}
    `;
    if(unlocked)card.onclick=()=>startStage(i);
    grid.appendChild(card);
  });
  showScreen('home');
}

function startStage(i){
  state={stageIndex:i,qIndex:0,score:0,answered:false};
  renderQuestion();showScreen('quiz');
}

function renderQuestion(){
  const stage=STAGES[state.stageIndex];
  const q=stage.questions[state.qIndex];
  const total=stage.questions.length;
  document.getElementById('quiz-stage-name').textContent=stage.emoji+' '+stage.title;
  document.getElementById('quiz-score').textContent=state.score+'点';
  document.getElementById('progress-fill').style.width=(state.qIndex/total*100)+'%';
  document.getElementById('q-counter').textContent=`Q${state.qIndex+1} / ${total}`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('explanation').innerHTML='';
  document.getElementById('next-btn').style.display='none';
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  q.c.forEach((c,ci)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-label">${LABELS[ci]}</span>${c}`;
    btn.onclick=()=>selectAnswer(ci);
    choicesEl.appendChild(btn);
  });
  state.answered=false;
}

function selectAnswer(selected){
  if(state.answered)return;
  state.answered=true;
  const q=STAGES[state.stageIndex].questions[state.qIndex];
  const correct=selected===q.a;
  if(correct)state.score++;
  document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===q.a)btn.classList.add('correct');
    else if(i===selected&&!correct)btn.classList.add('wrong');
    else btn.classList.add('dim');
  });
  document.getElementById('explanation').innerHTML=`
    <div class="explanation ${correct?'ok':'ng'}">
      <div class="expl-head">${correct?'? 正解！':'? 不正解'}</div>${q.e}
    </div>`;
  const nextBtn=document.getElementById('next-btn');
  nextBtn.style.display='block';
  const isLast=state.qIndex>=STAGES[state.stageIndex].questions.length-1;
  nextBtn.textContent=isLast?'結果を見る →':'次の問題へ →';
  document.getElementById('quiz-score').textContent=state.score+'点';
}

function nextQuestion(){
  if(state.qIndex<STAGES[state.stageIndex].questions.length-1){state.qIndex++;renderQuestion();}
  else finishStage();
}

function finishStage(){
  const stage=STAGES[state.stageIndex];
  const total=stage.questions.length;
  const score=state.score;
  const stars=calcStars(score,total);
  const rate=Math.round(score/total*100);
  saveProgress(stage.id,score,stars);
  document.getElementById('clear-emoji').textContent=stars===3?' ':stars>=2?' ':' ';
  document.getElementById('clear-title').textContent=stars===3?'パーフェクト！':stars>=1?'クリア！':'もう少し！';
  document.getElementById('clear-stage-name').textContent=stage.emoji+' '+stage.title;
  document.getElementById('res-score').textContent=`${score}/${total}`;
  document.getElementById('res-rate').textContent=`${rate}%`;
  for(let i=0;i<3;i++){
    const el=document.getElementById('star'+i);
    el.classList.remove('lit');
    if(i<stars)setTimeout(()=>el.classList.add('lit'),400+i*200);
  }
  if(stars===3)setTimeout(launchConfetti,300);
  showScreen('clear');
}

function retryStage(){startStage(state.stageIndex);}
function goHome(){renderHome();}

function launchConfetti(){
  const wrap=document.getElementById('confetti');
  wrap.innerHTML='';
  const colors=['#00c9ff','#f5a623','#00e676','#ff5252','#fff','#a78bfa'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;width:${6+Math.random()*8}px;height:${10+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*0.5}s;transform:rotate(${Math.random()*360}deg);`;
    wrap.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

renderHome();
</script>
</body>
</html>
